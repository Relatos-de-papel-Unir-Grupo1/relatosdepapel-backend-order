version: "3.9"

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - relatosdepapel-net
  db:
    image: mysql:8.0
    container_name: order-db
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: order_db      
    ports:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - relatosdepapel-net

networks:
  relatosdepapel-net:
    external: true
    
volumes:
  db_data: 
